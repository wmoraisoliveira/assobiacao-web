      min-height: 100vh;

    }
    header {
      background: #FF6B00;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header img { width: 36px; height: 36px; border-radius: 8px; }
    header span { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 64px;
      text-align: center;
    }
    .app-icon {

    .buttons {

      max-width: 300px;
    }
    .btn-store {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #111;
      color: #fff;
      border-radius: 14px;
      padding: 14px 24px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-store:hover { background: #333; transform: translateY(-1px); }
    .btn-store:active { transform: translateY(0); }
    .btn-store svg { flex-shrink: 0; }
    .btn-label { display: flex; flex-direction: column; text-align: left; }
    .btn-label small { font-size: 11px; font-weight: 400; opacity: 0.75; }
    .divider {
      margin: 32px 0 16px;
      font-size: 13px;
      color: #bbb;
    }
    .redirect-msg {
      font-size: 14px;
      color: #999;
      margin-top: 24px;
    }
    footer {
      text-align: center;

<script>
  var ua = navigator.userAgent;
  var isIOS = /iphone|ipad|ipod/i.test(ua);
  var isAndroid = /android/i.test(ua);

  if (isIOS) {
    document.getElementById('redirect-msg').textContent = 'Redirecionando para a App Store…';
    setTimeout(function() {
      window.location.href = 'https://apps.apple.com/app/id6773565397';
    }, 800);
  } else if (isAndroid) {
    document.getElementById('redirect-msg').textContent = 'Redirecionando para o Google Play…';
    setTimeout(function() {
      window.location.href = 'https://play.google.com/store/apps/details?id=com.assobiacao.app';
    }, 800);
  }
</script>
